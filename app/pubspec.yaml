name: crdl
description: "CRDL(차례대로) — 숫자를 1→N 순서대로 먹는 격자 퍼즐 게임"
publish_to: 'none'

version: 0.1.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  shared_preferences: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  fonts:
    - family: Jua
      fonts:
        - asset: assets/fonts/Jua-Regular.ttf
    - family: Fredoka
      fonts:
        - asset: assets/fonts/Fredoka.ttf
